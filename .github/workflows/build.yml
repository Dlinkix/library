name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'  
  workflow_dispatch: 

jobs:
  build:
    name: Build Windows Game
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Request Unity activation file
        uses: game-ci/unity-request-activation-file@main
        with:
          unityVersion: 6000.3.3f1
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Upload activation file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unity_activation_file
          path: ./*.alf
      
      # ОСТАНОВИТЕСЬ ЗДЕСЬ! 
      # Нужно скачать .alf файл, загрузить на сайт Unity,
      # получить .ulf и добавить его как секрет UNITY_LICENSE
      # ТОЛЬКО ПОСЛЕ ЭТОГО можно выполнять сборку