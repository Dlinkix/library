name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'  
  workflow_dispatch: 

jobs:
  build:
    name: Build Windows Game
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: StandaloneWindows64
          unityVersion: 6000.3.3f1
          buildMethod: Lobotom.Build.Editor.BuildCommand.BuildWindows64
          buildsPath: build
          allowDirtyBuild: true

      - name: Create ZIP archive
        run: |
          cd build/StandaloneWindows64
          zip -r ../../../Library-Windows.zip .
          cd ../../..
          ls -lh Library-Windows.zip

      - name: Upload to Releases
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Library-Windows.zip
          generate_release_notes: true
          name: Library ${{ github.ref_name }}
          body: |
            ## Скачать игру
            - Скачайте **Library-Windows.zip** ниже
            - Распакуйте архив
            - Запустите **Library.exe**

      - name: Upload as artifact (для тестов)
        uses: actions/upload-artifact@v4
        with:
          name: Library-Windows
          path: build/StandaloneWindows64/